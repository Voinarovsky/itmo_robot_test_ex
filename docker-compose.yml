services:
  aubo:
    build: .
    image: aubo_ros2_test:latest
    container_name: aubo_demo
    network_mode: host
    ipc: host
    environment:
      - ROS_DOMAIN_ID=42
      - USE_RVIZ=${USE_RVIZ:-false}
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command: ["/ros2_ws/scripts/run_demo.sh"]
