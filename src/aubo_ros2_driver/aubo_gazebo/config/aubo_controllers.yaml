controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - shoulder_joint
      - upperArm_joint
      - foreArm_joint
      - wrist1_joint
      - wrist2_joint
      - wrist3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 2.0

joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true

gazebo_ros2_control:
  ros__parameters:
    use_sim_time: true
    pid_gains:
      shoulder_joint: {p: 200.0, i: 0.5, d: 20.0, i_clamp: 5.0}
      upperArm_joint: {p: 200.0, i: 0.5, d: 20.0, i_clamp: 5.0}
      foreArm_joint:  {p: 150.0, i: 0.5, d: 15.0, i_clamp: 5.0}
      wrist1_joint:   {p: 50.0,  i: 0.1, d: 5.0,  i_clamp: 2.0}
      wrist2_joint:   {p: 50.0,  i: 0.1, d: 5.0,  i_clamp: 2.0}
      wrist3_joint:   {p: 30.0,  i: 0.1, d: 3.0,  i_clamp: 1.0}